<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="language" content="zh-CN">
    <link rel="stylesheet" href="css/love.css">
    
    <style>
        @keyframes heartbeat {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.08); }
            100% { transform: translateX(-50%) scale(1); }
        }
    </style>
</head>

<body>
    <div style="position: fixed; top: 10%; left: 50%; transform: translateX(-50%); text-align: center; color: #fff; font-size: 15px; font-weight: bold; z-index: 9999; pointer-events: none; background: rgba(255, 153, 168, 0.85); padding: 8px 20px; border-radius: 30px; box-shadow: 0 4px 12px rgba(255, 153, 168, 0.5); white-space: nowrap; animation: heartbeat 2s infinite;">
        🐾 小宝，戳戳屏幕，有我为你准备的专属BGM哦 🐾
    </div>

    <audio autoplay loop id="audios" preload="auto">
        <source src="MP3/1.mp3" type="audio/mpeg" />
    </audio>

    <div class="container" onselectstart="return false;" unselectable="on" style="-moz-user-select:none;">
        <div class="body_left">
            <img src="images/biubiubiu.gif" alt="" ondragstart='return false;'>
        </div>
        <div class="body_center love">
            <div class="block">
                <div class="div1"></div>
                <div class="div2"></div>
                <div class="div3"></div>
                <div class="div4"></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="border">
            <div class="border-top"></div>
            <div class="border-bottom"></div>
        </div>
    </div>

    <script type="text/javascript" src="js/love.js"></script>

    <script>
        var audio = document.getElementById('audios');
        
        // 1. 微信专属通道：利用微信内置接口，绕过点击限制强行播放
        document.addEventListener("WeixinJSBridgeReady", function () {
            audio.play();
        }, false);

        // 2. 万能兜底通道：如果微信接口失效，或者在其他浏览器打开，依然保留点击屏幕播放的功能
        document.body.addEventListener('click', function() {
            if(audio.paused) {
                audio.play();
            }
        });
    </script>

</body>
</html>
